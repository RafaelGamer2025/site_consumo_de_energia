<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lista de usuários Neo Energy.">
    <title>Neo Energy | Usuários</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="topbar">
        <div class="perfil">
            <h2>Usuários</h2>
            <p class="mini-label">Visão geral</p>
        </div>
        <div class="menu-topo">
            <a href="{{ url_for('admin_dashboard') }}">Admin</a>
            <a href="{{ url_for('logout') }}">Sair</a>
        </div>
    </div>

    <div class="container">
        <section class="card">
            <h2>Usuários cadastrados</h2>
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr><th>Nome</th><th>Email</th><th>Energia</th><th>Ação</th></tr>
                    </thead>
                    <tbody>
                        {% for usuario in usuarios %}
                        <tr>
                            <td>{{ usuario.nome }}</td>
                            <td>{{ usuario.email }}</td>
                            <td>{{ usuario.energia }}</td>
                            <td><a href="{{ url_for('usuario', id=usuario.id) }}">Ver</a></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</body>
</html>
