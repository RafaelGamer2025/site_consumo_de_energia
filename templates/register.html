<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Neo Energy: cadastre-se para controlar seu consumo de energia.">
    <title>Neo Energy | Cadastro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="container container-tight">
        <header class="hero">
            <p class="eyebrow">Comece agora</p>
            <h1>Crie sua conta Neo Energy</h1>
            <p class="hero-text">Cadastro rápido e seguro para quem quer controlar a conta de luz.</p>
            <p style="margin-top: 14px;"><a class="nav-button" href="{{ url_for('sobre_mim') }}">Sobre mim</a></p>
        </header>

        <main class="card card-form">
            <h2>Cadastro</h2>
            {% if error %}
            <p class="alert">{{ error }}</p>
            {% endif %}
            <form action="{{ url_for('register') }}" method="post">
                <label for="name">Nome completo</label>
                <input type="text" name="name" id="name" placeholder="Seu nome" required>

                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="seu@email.com" required>

                <label for="senha">Senha</label>
                <input type="password" name="senha" id="senha" placeholder="Senha segura" required>

                <label for="energia">Como está sua energia?</label>
                <select name="energia" id="energia">
                    <option>🔥 Alta</option>
                    <option>⚡ Média</option>
                    <option>💤 Baixa</option>
                </select>

                <button class="button" type="submit">Criar conta</button>
            </form>
            <p class="small-text">Já tem conta? <a href="{{ url_for('login') }}">Entrar</a></p>
        </main>
    </div>
    <script src="{{ url_for('static', filename='effects/rain.js') }}"></script>
</body>
</html>
